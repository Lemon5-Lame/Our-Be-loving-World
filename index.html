body { overflow: hidden; } /* Locks scrolling to vertical only */

/* Raining Hearts Animation */
.heart {
    position: absolute;
    top: -20px;
    animation: fall linear forwards;
    z-index: 1501;
}
@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}

/* Floating Birds for Title */
.bird-container {
    position: absolute;
    top: 50px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    animation: float 3s ease-in-out infinite;
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Keypad blocks */
.key-block {
    background: black !important;
    color: white !important;
    border: 1px solid #333;
    border-radius: 8px;
    height: 60px;
    font-size: 1.5rem;
}
.pin-dot.active { background: black !important; }

/* Myanmar Mini-Map Polaroid Style */
#myanmar-map-container {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 150px;
    background: white;
    padding: 10px 10px 30px 10px;

    transform: rotate(3deg);
    z-index: 100;

        /* Add this at the end of your <style> section */

//visitor mode>>>>>>>>
window.pressPin = (n) => {
    if (window.appData.currentPinInput.length >= 6) return;
    window.appData.currentPinInput += n;
    updatePinUI();
    
    if (window.appData.currentPinInput.length === 6) {
        const enteredPin = window.appData.currentPinInput;
        const correctPin = window.appData.settings.pin;

        if (enteredPin === "000000") {
            // Visit Mode
            showGatekeeperAlert("Visitor Access", "bg-blue-500 text-white");
            setTimeout(() => {
                window.enterApp(true);
                window.clearPin();
            }, 800);
        } else if (enteredPin === correctPin) {
            // Owner Mode
            showGatekeeperAlert("Welcome Home", "bg-green-500 text-white");
            setTimeout(() => {
                window.enterApp(false);
                window.clearPin();
            }, 800);
        } else {
            // Wrong Pin
            showGatekeeperAlert("Access Denied", "bg-red-600 text-white");
            window.clearPin();
        }
    }
};

function enterApp(isVisitMode) {
    document.getElementById('gatekeeper').classList.add('hidden');
    // Rule 2: Check if user is already registered in LocalStorage
    const savedUser = localStorage.getItem('ldr_user_identity');
    if (!savedUser && !isVisitMode) {
        document.getElementById('modal-register').classList.remove('hidden');
    } else {
        document.getElementById('app-content').classList.remove('hidden');
    }
}

        async function init() {
            const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
            if (token) await signInWithCustomToken(auth, token);
            else await signInAnonymously(auth);

            onAuthStateChanged(auth, (user) => {
                window.appData.user = user;
                if (user) syncData();
            });
        }

        function syncData() {
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'ldr_settings', 'main');
            onSnapshot(settingsRef, (snap) => {
                if (snap.exists()) {
                    window.appData.settings = snap.data();
                    applyUIThemes();
                } else {
                    setDoc(settingsRef, {
                        pin: '123456',
                        theme: 'stars',
                        runningTitle: 'Our World • ',
                        titleColor: 'multi',
                        userA: { name: 'You' },
                        userB: { name: 'Me' },
                        reminder: { label: '', date: '' }
                    });
                }
            }, (err) => console.error(err));

            const pinsCol = collection(db, 'artifacts', appId, 'public', 'data', 'ldr_pins');
            onSnapshot(pinsCol, (snapshot) => {
                const pins = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCanvas(pins);
            }, (err) => console.error(err));

            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('gatekeeper').classList.remove('hidden');
            lucide.createIcons();
        }

        }

        window.clearPin = () => {

        function updatePinUI() {

            });
        }

        function applyUIThemes() {

            } else {
                next.textContent = "No Event Set";

        window.previewFile = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                window.appData.photoBase64 = ev.target.result;
                document.getElementById('photo-preview').src = ev.target.result;
                document.getElementById('photo-drop').classList.add('hidden');
                document.getElementById('photo-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.clearPhoto = () => {
            window.appData.photoBase64 = null;

        window.savePin = async () => {
            
            const type = window.appData.createType;
            const canvas = document.getElementById('canvas');
            const scrollX = canvas.scrollLeft + (canvas.clientWidth / 2);
            const scrollY = canvas.scrollTop + (canvas.clientHeight / 2);

            const pinData = {
                type,
                authorId: window.appData.activeUserId,
                x: scrollX + (Math.random() * 200 - 100),
                y: scrollY + (Math.random() * 200 - 100),
                createdAt: new Date().toISOString()
            };

            if (type === 'note') {
                pinData.content = document.getElementById('note-text').value;
                pinData.color = document.getElementById('note-color').value;
                pinData.fontFamily = document.getElementById('note-font').value;
                pinData.fontSize = document.getElementById('note-size').value;
                if (!pinData.content) return;
            } else {
                pinData.content = window.appData.photoBase64;
                pinData.caption = document.getElementById('photo-caption').value;
                pinData.frameType = document.getElementById('photo-frame').value;
                if (!pinData.content) return;

            const ref = doc(collection(db, 'artifacts', appId, 'public', 'data', 'ldr_pins'));
            await setDoc(ref, pinData);
            window.toggleModal('modal-create', false);
            document.getElementById('note-text').value = '';
            window.clearPhoto();

        function renderCanvas(pins) {
            const surface = document.getElementById('canvas-surface');

            pins.forEach(pin => {
                const div = document.createElement('div');
                div.className = 'pin-container group';
                div.style.left = `${pin.x}px`;

                                <i data-lucide="trash-2" style="width:14px; height:14px;"></i>

                        ` : ''}
                        ${pin.type === 'note' ? `
                            <div class="p-8 shadow-2xl min-w-[240px] max-w-[400px] bg-white border border-gray-100">
                                <p class="leading-snug break-words ${pin.color === 'multi' ? 'color-running' : ''} font-${pin.fontFamily || 'handwriting'} ${pin.fontSize || 'text-4xl'}" 
                                   style="color: ${pin.color !== 'multi' ? pin.color : 'inherit'}">
                                    ${pin.content}
                                </p>
                                <div class="mt-8 pt-2 text-right font-handwriting text-2xl opacity-40 italic">- ${authorName}</div>
                            </div>
                        ` : `
                            <div class="p-1 bg-white shadow-2xl frame-${pin.frameType || 'classic'}">
                                <img src="${pin.content}" class="max-w-[340px] max-h-[500px] object-cover block">
                                ${pin.caption ? `<div class="mt-4 font-handwriting text-3xl text-gray-600 flex justify-center px-2 bg-white pb-3"><span>${pin.caption}</span></div>` : ''}
                            </div>
                        `}
                    </div>
                `;
                surface.appendChild(div);
                attachDrag(div, pin.id);
            });
            lucide.createIcons();
        }

        function attachDrag(el, id) {
            let start = { x: 0, y: 0 };
            const onMove = (e) => {
                if (!window.appData.isDragging) return;
                el.style.left = `${e.clientX - start.x}px`;
                el.style.top = `${e.clientY - start.y}px`;
            };
            const onEnd = async () => {
                if (!window.appData.isDragging) return;
                window.appData.isDragging = false;
                el.style.zIndex = 'auto';
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onEnd);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ldr_pins', id), {
                    x: parseInt(el.style.left),
                    y: parseInt(el.style.top)
                });
            };
            el.onmousedown = (e) => {
                if (e.target.closest('button')) return;
                window.appData.isDragging = true;
                el.style.zIndex = 1000;
                start = { x: e.clientX - el.offsetLeft, y: e.clientY - el.offsetTop };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
            };
        }

let currentZoom = 1;

window.changeZoom = (delta) => {
    currentZoom = Math.max(0.2, Math.min(2, currentZoom + delta)); // Limits zoom between 20% and 200%
    const surface = document.getElementById('canvas-surface');
    surface.style.transform = `scale(${currentZoom})`;
};

window.centerCanvas = () => {
    const canvas = document.getElementById('canvas');
    const surface = document.getElementById('canvas-surface');
    
    // Centers the view
    canvas.scrollTo({
        left: (surface.offsetWidth * currentZoom - canvas.clientWidth) / 2,
        top: (surface.offsetHeight * currentZoom - canvas.clientHeight) / 2,
        behavior: 'smooth'
    });

// --- STEP 2: TIME COUNTER LOGIC ---
window.startTimeCounter = (startDateStr) => {
    if (window.dateInterval) clearInterval(window.dateInterval);

    window.dateInterval = setInterval(() => {
        const start = new Date(startDateStr);
        const now = new Date();
        const diff = now - start;
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / 1000 / 60) % 60);
        const secs = Math.floor((diff / 1000) % 60);

        const timerEl = document.getElementById('time-counter');
        if (timerEl) {
            timerEl.textContent = `${days}d ${hours}h ${mins}m ${secs}s`;
        }
    }, 1000);
};
