<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --primary: #ff4d6d; }
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; background: #0b0d10; font-family: 'Inter', sans-serif; }

        /* App Border - MANDATORY LIMIT */
        #main-container { 
            border: 8px solid #2a2a2a; 
            height: 100vh; 
            width: 100vw; 
            position: relative; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .font-handwriting { font-family: 'Caveat', cursive; }
        .font-fancy { font-family: 'Dancing Script', cursive; }
        .font-typewriter { font-family: 'Courier Prime', monospace; }
        .font-typewriter-rough { font-family: 'Special Elite', system-ui; }

        /* Physics Canvas */
        #physics-canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* Map Styling */
        #map { height: 100%; width: 100%; background: #0b0d10; z-index: 10; }
        .custom-marker { background: none; border: none; }

        /* Book Styling */
        .book-container { perspective: 2000px; z-index: 100; }
        .book-page {
            width: 450px; height: 600px; background: #fdf6e3; border: 1px solid #dcd3b6;
            padding: 40px; box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            position: relative; color: #4a3728;
        }
        .pinned-item { position: absolute; cursor: move; }

        .hidden { display: none !important; }

        /* Keypad Styles */
        .keypad-btn {
            @apply w-14 h-14 rounded-full border border-white/20 text-white text-lg font-bold flex items-center justify-center transition-all hover:bg-white/30 active:scale-90;
        }

        /* HEADER UI - Locked to Top */
        header { 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            height: 70px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-blur-md;
            z-index: 60; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            width: 100%;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="main-container">

    <!-- HEADER (Hidden during Lock/Gatekeeper) -->
    <header id="app-header" class="hidden">
        <div class="header-title-container">
            <h1 id="header-title" class="font-fancy text-2xl text-pink-400">Our Memory Vault</h1>
            <div id="reminder-box" class="bg-white/5 border border-white/10 px-4 py-1.5 rounded-full flex items-center gap-3">
                <span id="reminder-label" class="text-[10px] uppercase tracking-widest text-white/50 font-bold">Days Together</span>
                <span id="reminder-days" class="font-typewriter text-pink-400 font-bold">0</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleSettings(true)" class="p-2 hover:bg-white/10 rounded-full text-white/70 transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
            <button onclick="lockApp()" class="p-2 hover:bg-white/10 rounded-full text-white/70 transition-colors">
                <i data-lucide="lock" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <div id="content-area">
        <!-- SECTION 1: GATEKEEPER -->
        <div id="gatekeeper" class="absolute inset-0 z-50 flex items-center justify-center bg-black">
            <canvas id="physics-canvas"></canvas>
            <div id="keypad-anchor" class="relative z-10 bg-white/5 backdrop-blur-xl p-8 rounded-3xl border border-white/10 shadow-2xl w-72 md:w-80 text-center">
                <h2 class="text-white font-fancy text-3xl mb-6">Enter Pin</h2>
                <div id="pin-display" class="flex justify-center gap-3 mb-8">
                    <div class="w-3 h-3 rounded-full border border-pink-400"></div>
                    <div class="w-3 h-3 rounded-full border border-pink-400"></div>
                    <div class="w-3 h-3 rounded-full border border-pink-400"></div>
                    <div class="w-3 h-3 rounded-full border border-pink-400"></div>
                    <div class="w-3 h-3 rounded-full border border-pink-400"></div>
                    <div class="w-3 h-3 rounded-full border border-pink-400"></div>
                </div>
                <div class="grid grid-cols-3 gap-3 justify-items-center">
                    <button onclick="pressKey('1')" class="keypad-btn">1</button>
                    <button onclick="pressKey('2')" class="keypad-btn">2</button>
                    <button onclick="pressKey('3')" class="keypad-btn">3</button>
                    <button onclick="pressKey('4')" class="keypad-btn">4</button>
                    <button onclick="pressKey('5')" class="keypad-btn">5</button>
                    <button onclick="pressKey('6')" class="keypad-btn">6</button>
                    <button onclick="pressKey('7')" class="keypad-btn">7</button>
                    <button onclick="pressKey('8')" class="keypad-btn">8</button>
                    <button onclick="pressKey('9')" class="keypad-btn">9</button>
                    <button onclick="pressKey('C')" class="keypad-btn bg-red-500/20">C</button>
                    <button onclick="pressKey('0')" class="keypad-btn">0</button>
                    <button onclick="pressKey('⌫')" class="keypad-btn bg-white/10">⌫</button>
                </div>
            </div>
        </div>

        <!-- SECTION 2: INFO FORM -->
        <div id="info-form" class="hidden absolute inset-0 z-30 bg-[#0b0d10] flex items-center justify-center p-6">
            <div class="max-w-md w-full bg-white/5 p-8 rounded-2xl border border-white/10 text-white space-y-4 shadow-2xl">
                <h2 class="text-3xl font-fancy text-pink-400 text-center">Identity Check</h2>
                <div><label class="text-[10px] uppercase font-bold tracking-tighter opacity-50">Full Name</label><input type="text" id="in-name" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 mt-1 outline-none focus:border-pink-500 transition-colors"></div>
                <div><label class="text-[10px] uppercase font-bold tracking-tighter opacity-50">Current City (Myanmar)</label><input type="text" id="in-city" placeholder="e.g. Yangon, Mandalay" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 mt-1 outline-none focus:border-pink-500 transition-colors"></div>
                <div><label class="text-[10px] uppercase font-bold tracking-tighter opacity-50">Birthday</label><input type="date" id="in-bday" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 mt-1 outline-none focus:border-pink-500 transition-colors"></div>
                <div><label class="text-[10px] uppercase font-bold tracking-tighter opacity-50">Gender</label>
                    <select id="in-gender" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 mt-1 outline-none focus:border-pink-500 transition-colors">
                        <option value="Male" class="bg-black">Male</option><option value="Female" class="bg-black">Female</option>
                    </select>
                </div>
                <button onclick="saveUserInfo()" class="w-full bg-pink-500 hover:bg-pink-600 py-4 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg shadow-pink-500/20">Open Your World</button>
            </div>
        </div>

        <!-- SECTION 3: MAP VIEW -->
        <div id="world-view" class="hidden absolute inset-0">
            <div id="map"></div>
        </div>

        <!-- SECTION 4: DIARY VIEW -->
        <div id="book-view" class="hidden absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
            <button onclick="closeBook()" class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors"><i data-lucide="x" class="w-8 h-8"></i></button>
            <div class="book-container">
                <div class="book-page">
                    <div class="flex justify-between items-center border-b border-gray-300 pb-2 mb-4">
                        <span id="page-num" class="font-typewriter text-xs text-gray-500">Page 1</span>
                        <h3 class="font-fancy text-2xl">Diary of Us</h3>
                    </div>
                    <div id="page-content" class="relative h-[380px] border border-gray-200/50 rounded-lg p-2 overflow-hidden bg-white/30">
                        <!-- Dynamic Memories -->
                    </div>
                    <div class="mt-8 space-y-3">
                        <div class="flex gap-2">
                            <button onclick="promptNote()" class="flex-1 py-3 bg-pink-500 text-white rounded-lg text-xs font-bold uppercase tracking-widest shadow-lg shadow-pink-500/20 active:scale-95 transition-transform">Add Note</button>
                            <button onclick="promptPhoto()" class="flex-1 py-3 bg-blue-500 text-white rounded-lg text-xs font-bold uppercase tracking-widest shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">Add Photo</button>
                        </div>
                        <button onclick="turnNextPage()" class="w-full py-2.5 bg-gray-800 hover:bg-black text-white rounded-lg font-bold text-sm transition-colors">Next Page →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="modal-settings" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[#121212] w-full max-w-md p-8 rounded-2xl border border-white/10 text-white shadow-2xl">
            <h2 class="text-2xl font-fancy mb-6 text-pink-400">Vault Settings</h2>
            <div class="space-y-4">
                <div><label class="block text-[10px] uppercase font-bold tracking-widest opacity-50 mb-1">Vault Title</label><input type="text" id="set-title" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-pink-500"></div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="block text-[10px] uppercase font-bold tracking-widest opacity-50 mb-1">Anniversary</label><input type="date" id="set-date-value" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-pink-500"></div>
                    <div class="flex-1"><label class="block text-[10px] uppercase font-bold tracking-widest opacity-50 mb-1">6-Digit Pin</label><input type="text" id="set-pin" maxlength="6" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-pink-500"></div>
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="saveSettings()" class="flex-1 bg-pink-500 py-3 rounded-xl font-bold hover:bg-pink-600 transition-colors">Save Changes</button>
                <button onclick="toggleSettings(false)" class="flex-1 bg-white/10 py-3 rounded-xl font-bold hover:bg-white/20 transition-colors">Cancel</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- STATE ---
    let appState = {
        pin: '123456',
        currentPin: '',
        title: 'Our Memory Vault',
        reminderDate: '2023-01-01',
        user: { name: '', city: '', lat: 21.9162, lng: 95.9560, gender: 'Male' },
        page: 1,
        memories: []
    };

    // --- PHYSICS ENGINE ---
    const { Engine, Render, Runner, Bodies, Composite } = Matter;
    const engine = Engine.create();
    let render;
    let gateActive = true;

    function initPhysics() {
        const canvas = document.getElementById('physics-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        render = Render.create({
            canvas: canvas,
            engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });

        const rect = document.getElementById('keypad-anchor').getBoundingClientRect();
        const bouncer = Bodies.rectangle(rect.left + rect.width/2, rect.top + rect.height/2, rect.width, rect.height, { isStatic: true, render: { visible: false } });
        
        Composite.add(engine.world, bouncer);
        Render.run(render);
        Runner.run(Runner.create(), engine);

        setInterval(() => { if(gateActive) spawnHeart(); }, 400);
    }

    function spawnHeart() {
        const x = Math.random() * window.innerWidth;
        const heart = Bodies.polygon(x, -20, 3, 12, {
            restitution: 0.8,
            render: { fillStyle: '#ff4d6d' }
        });
        heart.label = 'heart';
        Composite.add(engine.world, heart);
        setTimeout(() => Composite.remove(engine.world, heart), 6000);
    }

    // --- KEYPAD LOGIC ---
    function pressKey(num) {
        if (num === 'C') appState.currentPin = '';
        else if (num === '⌫') appState.currentPin = appState.currentPin.slice(0, -1);
        else if (appState.currentPin.length < 6) appState.currentPin += num;
        
        updatePinUI();
        if (appState.currentPin.length === 6) checkPin();
    }

    function updatePinUI() {
        const dots = document.querySelectorAll('#pin-display div');
        dots.forEach((d, i) => d.style.background = i < appState.currentPin.length ? '#ff4d6d' : 'transparent');
    }

    function checkPin() {
        if (appState.currentPin === appState.pin) {
            gateActive = false;
            document.getElementById('gatekeeper').classList.add('transition-opacity', 'duration-1000', 'opacity-0');
            setTimeout(() => {
                document.getElementById('gatekeeper').classList.add('hidden');
                document.getElementById('info-form').classList.remove('hidden');
            }, 1000);
        } else {
            engine.world.bodies.forEach(b => { if(b.label==='heart') b.render.fillStyle = '#ff4500'; });
            setTimeout(() => { appState.currentPin = ''; updatePinUI(); }, 500);
        }
    }

    // --- MAP SYSTEM ---
    let map;
    function initMap(lat, lng) {
        if (map) map.remove();
        map = L.map('map', { zoomControl: false }).setView([lat, lng], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        
        const icon = L.divIcon({
            className: 'custom-marker',
            html: `<div class="text-5xl hover:scale-110 transition-transform drop-shadow-[0_0_15px_rgba(255,77,109,0.5)] cursor-pointer" onclick="openBook()">${appState.user.gender === 'Male' ? '👦' : '👧'}</div>`
        });
        L.marker([lat, lng], { icon }).addTo(map).bindTooltip(appState.user.name, { 
            permanent: true, direction: 'top', className: 'bg-transparent border-0 text-white font-bold text-xs uppercase tracking-widest' 
        });
    }

    // --- INFO FORM ---
    function saveUserInfo() {
        const name = document.getElementById('in-name').value;
        const city = document.getElementById('in-city').value;
        if (!name || !city) return;

        const cityCoords = { 
            "yangon": [16.8661, 96.1951], "mandalay": [21.9588, 96.0891], 
            "naypyidaw": [19.7633, 96.0785], "taunggyi": [20.7888, 97.0336],
            "bago": [17.3351, 96.4817], "pyin oo lwin": [22.0321, 96.4632]
        };
        const coords = cityCoords[city.toLowerCase()] || [21.9162, 95.9560];

        appState.user = { name, city, lat: coords[0], lng: coords[1], gender: document.getElementById('in-gender').value };
        
        document.getElementById('info-form').classList.add('hidden');
        document.getElementById('world-view').classList.remove('hidden');
        document.getElementById('app-header').classList.remove('hidden'); // SHOW HEADER NOW
        initMap(coords[0], coords[1]);
        updateHeader();
    }

    // --- DIARY LOGIC ---
    function openBook() { 
        document.getElementById('book-view').classList.remove('hidden'); 
        renderPage(); 
    }
    function closeBook() { document.getElementById('book-view').classList.add('hidden'); }
    function turnNextPage() { appState.page++; renderPage(); }

    function renderPage() {
        document.getElementById('page-num').innerText = `Page ${appState.page}`;
        const container = document.getElementById('page-content');
        container.innerHTML = '';
        appState.memories.filter(m => m.page === appState.page).forEach(m => {
            const el = document.createElement('div');
            el.className = "pinned-item bg-white p-2 shadow-lg border-t-2 border-pink-400 max-w-[140px]";
            el.style.left = m.x + 'px';
            el.style.top = m.y + 'px';
            el.style.transform = `rotate(${m.rot}deg)`;
            if (m.type === 'text') {
                el.innerHTML = `<p class="font-handwriting text-[11px] leading-tight text-gray-800">${m.content}</p>`;
            } else {
                el.innerHTML = `<img src="${m.content}" class="w-full rounded h-auto" onerror="this.src='https://via.placeholder.com/150?text=Invalid+Image'">`;
            }
            container.appendChild(el);
        });
    }

    function promptNote() {
        const txt = window.prompt("Write your memory:");
        if (txt) {
            appState.memories.push({ 
                page: appState.page, type: 'text', content: txt, 
                x: Math.random() * 200 + 20, y: Math.random() * 250 + 20, rot: (Math.random() - 0.5) * 20 
            });
            renderPage();
        }
    }

    function promptPhoto() {
        const url = window.prompt("Enter Image Link:");
        if (url) {
            appState.memories.push({ 
                page: appState.page, type: 'photo', content: url, 
                x: Math.random() * 150 + 20, y: Math.random() * 180 + 20, rot: (Math.random() - 0.5) * 15 
            });
            renderPage();
        }
    }

    // --- SETTINGS ---
    function updateHeader() {
        document.getElementById('header-title').innerText = appState.title;
        const start = new Date(appState.reminderDate);
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
        document.getElementById('reminder-days').innerText = Math.max(0, diff);
    }

    function toggleSettings(show) {
        if (show) {
            document.getElementById('set-title').value = appState.title;
            document.getElementById('set-date-value').value = appState.reminderDate;
            document.getElementById('set-pin').value = appState.pin;
        }
        document.getElementById('modal-settings').classList.toggle('hidden', !show);
    }

    function saveSettings() {
        appState.title = document.getElementById('set-title').value;
        appState.reminderDate = document.getElementById('set-date-value').value;
        appState.pin = document.getElementById('set-pin').value;
        updateHeader();
        toggleSettings(false);
    }

    function lockApp() {
        appState.currentPin = '';
        updatePinUI();
        gateActive = true;
        document.getElementById('world-view').classList.add('hidden');
        document.getElementById('book-view').classList.add('hidden');
        document.getElementById('info-form').classList.add('hidden');
        document.getElementById('app-header').classList.add('hidden'); // HIDE HEADER ON LOCK
        document.getElementById('gatekeeper').classList.remove('hidden', 'opacity-0');
        updateHeader();
    }

    window.onload = () => {
        initPhysics();
        lucide.createIcons();
        updateHeader();
    };

    window.onresize = () => {
        const canvas = document.getElementById('physics-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
</script>

</body>
</html>
